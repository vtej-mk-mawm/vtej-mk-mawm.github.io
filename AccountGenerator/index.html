<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountnaam generator</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f3f6fa;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #1f2937;
        }

        .container {
            width: 100%;
            max-width: 520px;
            background: white;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 2rem;
            text-align: center;
            color: #1e3a8a;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 35px;
            font-size: 0.95rem;
        }

        label {
            display: block;
            margin-bottom: 6px;
            margin-top: 18px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        button {
            width: 100%;
            margin-top: 28px;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #1d4ed8;
        }

        #resultaat {
            margin-top: 30px;
            padding: 18px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 12px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #1e40af;
            min-height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .placeholder {
            color: #9ca3af;
            font-weight: normal;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Gebruikersnaam Generator</h1>
        <p class="subtitle">Gebaseerd op de versie van vbrh-immalle</p>

        <label for="voornaam">Voornaam</label>
        <input type="text" id="voornaam" placeholder="Bijv. Jan">

        <label for="achternaam">Achternaam</label>
        <input type="text" id="achternaam" placeholder="Bijv. Van Boom">

        <button onclick="maakGebruikersnaam()">Genereer</button>

        <div id="resultaat">
            <span class="placeholder">De gegenereerde gebruikersnaam verschijnt hier</span>
        </div>
    </div>

    <script>
        function maakGebruikersnaam() {
            let voornaam = document.getElementById("voornaam").value.trim();
            let achternaam = document.getElementById("achternaam").value.trim();

            let delen = achternaam.split(" ");
            let initialen = "";

            for (let deel of delen) {
                if (deel.length > 0) {
                    initialen += deel[0].toUpperCase();
                }
            }

            let gebruikersnaam = `${voornaam}${initialen}-mk-mawm`;
            document.getElementById("resultaat").innerText = gebruikersnaam;
        }
    </script>

</body>
</html>
